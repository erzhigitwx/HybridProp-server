version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      HYBRIDPROP_CONFIG: ml/config/config.yaml
      PYTHONPATH: /app
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
